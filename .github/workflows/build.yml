name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sdcc build-essential
    
    - name: Build
      run: make
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CH559USB.hex
        path: CH559USB.hex
